# Basalt configuration file
#
# Place at /etc/basalt/basalt.toml or pass via --config path
# CLI flags override values set here.

[server]
# HTTP REST API bind address
http_host = "127.0.0.1"
http_port = 7380

# RESP2 (Redis-compatible) bind address
resp_host = "127.0.0.1"
resp_port = 6380

# Number of shards (each is an independent concurrent HashMap)
# Must be a power of 2. Default: 64
shard_count = 64

# Directory for persistence snapshots
# When set, snapshots are written to this directory.
# On startup, the latest snapshot is loaded automatically.
# db_path = "/var/lib/basalt"

# How often to auto-snapshot (milliseconds). Default: 60000 (60s)
# Set to 0 to disable auto-snapshots (manual only via POST /snapshot or SNAP command).
# snapshot_interval_ms = 60000

# How often to sweep expired entries (milliseconds). Default: 30000 (30s)
# Set to 0 to disable background sweeping (expired entries still cleaned on read).
# sweep_interval_ms = 30000

# How often to reap low-relevance entries (milliseconds). Default: 0 (disabled)
# Set > 0 to enable automatic cleanup of entries below the relevance floor.
# decay_reap_interval_ms = 30000

# Default decay lambda (rate parameter). Default: ln(2)/24 (~0.0289) for 24h halflife.
# decay_default_lambda = 0.02888

# How often to check trigger conditions and fire matching triggers (milliseconds).
# Default: 30000 (30s). Set to 0 to disable trigger sweep.
# trigger_sweep_interval_ms = 30000

# Maximum entries per shard. Default: 1000000
# When a shard is at capacity, new keys are rejected.
# Updates to existing keys always succeed.
# max_entries = 1000000

# Minimum value size (bytes) to LZ4-compress in snapshots. Default: 1024
# Set to 0 to disable snapshot compression.
# snapshot_compression_threshold = 1024

# Minimum value size (bytes) to LZ4-compress values in memory at runtime. Default: 1024
# Set to 0 to disable runtime compression.
# compression_threshold = 1024

# WAL size for replication (number of entries to keep). Default: 10000
# Larger values give replicas more time to catch up after disconnects.
# wal_size = 10000

# Use io_uring for the RESP server (Linux only, requires --features io-uring)
# io_uring = false

# Rate limiting: max requests per window per client (0 = disabled, default).
# HTTP: per-IP. RESP: per-connection.
# rate_limit_requests = 0

# Rate limiting: window duration in milliseconds (default: 1000 = 1 second).
# rate_limit_window_ms = 1000

[auth]
# Path to a tokens file (one token per line)
# Format: <token> <namespace1> [namespace2 ...]
# Use * for wildcard (all namespaces)
# Lines starting with # are comments, blank lines ignored.
# tokens_file = "/etc/basalt/tokens.txt"

# You can also set tokens directly via CLI args:
#   basalt --auth "bsk-admin:*" --auth "bsk-agent1:agent-1,shared"
# CLI tokens override file tokens with the same value.

[llm]
# LLM provider: "openai", "anthropic", or "custom".
# "custom" uses the OpenAI-compatible API format with a custom base_url.
# Empty or omitted = LLM features disabled.
# provider = "openai"

# API key for the LLM provider.
# api_key = "sk-..."

# Model to use (provider-specific defaults apply if omitted).
# OpenAI: "gpt-4o-mini" (default), "gpt-4o", "gpt-3.5-turbo"
# Anthropic: "claude-sonnet-4-20250514" (default), "claude-haiku-4-20250414"
# model = "gpt-4o-mini"

# Base URL override (for OpenAI-compatible endpoints).
# Use this with provider = "custom" to point at Ollama, vLLM, LiteLLM, etc.
# OpenAI default: https://api.openai.com/v1
# Anthropic default: https://api.anthropic.com
# base_url = "http://localhost:11434/v1"

# API version header (Anthropic only, default: "2023-06-01").
# api_version = "2023-06-01"

# Request timeout in milliseconds (default: 30000).
# timeout_ms = 30000

# Default max tokens for completions (default: 1024).
# default_max_tokens = 1024

# Default temperature for completions (default: 0.3).
# default_temperature = 0.3
